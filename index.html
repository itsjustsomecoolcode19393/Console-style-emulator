<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Handheld</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0eeea;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --text: #111110;
  --text2: #6b6b67;
  --text3: #b0afa9;
  --accent: #111110;
  --radius-card: 20px;
  --radius-sm: 12px;
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'DM Sans', sans-serif;
  --nav-h: 64px;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Page ── */
#app {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  position: relative;
}

/* ── Top nav ── */
.nav {
  height: var(--nav-h);
  padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.nav-logo {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: -0.01em;
  color: var(--text);
}
.nav-logo em { font-style: italic; color: var(--text2); }
.nav-right { display: flex; align-items: center; gap: 12px; }
.nav-clock {
  font-size: 13px;
  font-weight: 400;
  color: var(--text3);
  letter-spacing: 0.02em;
  font-variant-numeric: tabular-nums;
}
.nav-add {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--text);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, background 0.15s;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.nav-add:active { transform: scale(0.92); }
.nav-add svg { width: 16px; height: 16px; stroke: #fff; stroke-width: 2; stroke-linecap: round; fill: none; }
/* invisible file input over button */
.nav-add input {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer;
  width: 100%; height: 100%;
  font-size: 100px;
}

/* ── Filter pills ── */
.filters {
  padding: 0 24px 16px;
  display: flex; gap: 8px;
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }
.pill {
  padding: 7px 16px;
  border-radius: 100px;
  border: 1px solid var(--border2);
  background: transparent;
  font-family: var(--font-body);
  font-size: 13px; font-weight: 400;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.18s;
  flex-shrink: 0;
}
.pill:hover { color: var(--text); border-color: rgba(0,0,0,0.25); }
.pill.active {
  background: var(--text);
  color: #fff;
  border-color: var(--text);
}

/* ── Game grid ── */
.grid-wrap {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0 24px 32px;
  scrollbar-width: none;
}
.grid-wrap::-webkit-scrollbar { display: none; }

.grid-section-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 14px;
  padding-top: 4px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 32px;
}

/* ── Game card ── */
.game-card {
  border-radius: var(--radius-card);
  overflow: hidden;
  cursor: pointer;
  background: var(--surface);
  border: 1px solid var(--border);
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  animation: fadeUp 0.35s ease both;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.game-card:active { transform: scale(0.96); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-cover {
  width: 100%;
  aspect-ratio: 3/4;
  display: flex; align-items: center; justify-content: center;
  font-size: 52px;
  position: relative;
  overflow: hidden;
}

/* Cover color themes */
.cv-stone  { background: #e8e5df; }
.cv-sand   { background: #ede8dc; }
.cv-sage   { background: #dde8e0; }
.cv-slate  { background: #dde1e8; }
.cv-rose   { background: #ece0e0; }
.cv-mauve  { background: #e5e0ec; }
.cv-clay   { background: #ece3db; }
.cv-mist   { background: #dfe4e8; }

.card-cover-inner {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%;
  position: relative;
}

/* decorative circle behind emoji */
.card-cover-inner::before {
  content: '';
  position: absolute;
  width: 70%; height: 70%;
  border-radius: 50%;
  background: rgba(0,0,0,0.04);
}

.card-cover-emoji {
  position: relative; z-index: 1;
  font-size: 48px;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.10));
}

.card-system-badge {
  position: absolute;
  top: 10px; left: 10px;
  font-size: 9px; font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text2);
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 3px 8px;
  border-radius: 100px;
  border: 1px solid rgba(0,0,0,0.08);
}

.card-info {
  padding: 12px 14px 14px;
  border-top: 1px solid var(--border);
}
.card-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-meta {
  font-size: 11px;
  color: var(--text3);
  font-weight: 400;
}

/* ── Add card (upload tile) ── */
.add-card {
  border-radius: var(--radius-card);
  border: 1.5px dashed var(--border2);
  background: transparent;
  cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px;
  transition: border-color 0.18s, background 0.18s;
  -webkit-tap-highlight-color: transparent;
  aspect-ratio: 3/4;
  position: relative;
  overflow: hidden;
}
.add-card:hover { border-color: var(--text3); background: rgba(0,0,0,0.02); }
.add-card input {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer;
  width: 100%; height: 100%;
  font-size: 100px;
}
.add-card-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
}
.add-card-icon svg { width: 16px; height: 16px; stroke: var(--text3); stroke-width: 2; stroke-linecap: round; fill: none; }
.add-card-label { font-size: 12px; color: var(--text3); font-weight: 400; }

/* ── Empty state ── */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%;
  gap: 12px;
  padding-bottom: 80px;
  text-align: center;
}
.empty-icon { font-size: 48px; margin-bottom: 4px; }
.empty-title { font-family: var(--font-display); font-size: 22px; color: var(--text); }
.empty-sub { font-size: 14px; color: var(--text2); line-height: 1.6; max-width: 240px; }
.empty-btn {
  margin-top: 8px;
  padding: 12px 28px;
  border-radius: 100px;
  background: var(--text);
  color: #fff;
  font-family: var(--font-body);
  font-size: 14px; font-weight: 500;
  border: none; cursor: pointer;
  transition: opacity 0.15s;
  position: relative; overflow: hidden;
}
.empty-btn:active { opacity: 0.8; }
.empty-btn input {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer;
  width: 100%; height: 100%;
  font-size: 100px;
}

/* ── Bottom tab bar ── */
.tabbar {
  height: var(--nav-h);
  background: rgba(245,244,240,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.tab-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: none; border: none; cursor: pointer;
  padding: 8px 20px;
  -webkit-tap-highlight-color: transparent;
}
.tab-btn svg { width: 22px; height: 22px; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; fill: none; transition: stroke 0.15s; }
.tab-btn span { font-size: 10px; font-weight: 500; letter-spacing: 0.03em; transition: color 0.15s; }
.tab-btn.active svg { stroke: var(--text); }
.tab-btn.active span { color: var(--text); }
.tab-btn:not(.active) svg { stroke: var(--text3); }
.tab-btn:not(.active) span { color: var(--text3); }

/* ── Emulator overlay ── */
#emu-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: #000;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
#emu-overlay.open { opacity: 1; pointer-events: all; }

.emu-nav {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 10;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
}
.emu-back {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: none; border-radius: 100px;
  padding: 8px 16px 8px 12px;
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.85);
  transition: background 0.15s;
}
.emu-back svg { width: 16px; height: 16px; stroke: rgba(255,255,255,0.85); stroke-width: 2; stroke-linecap: round; fill: none; }
.emu-back:active { background: rgba(255,255,255,0.2); }
.emu-title { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.7); letter-spacing: 0.01em; }
.emu-status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #34c759;
  box-shadow: 0 0 8px #34c759;
  display: none;
}
.emu-status-dot.visible { display: block; }

#emulator { width: 100%; height: 100%; }

/* demo placeholder */
.demo-placeholder {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; text-align: center; padding: 40px;
  color: #fff;
}
.demo-emoji { font-size: 64px; animation: breathe 3s ease-in-out infinite; }
@keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
.demo-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
.demo-name { font-family: var(--font-display); font-size: 28px; color: #fff; }
.demo-desc { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.7; max-width: 300px; }
.demo-hint { font-size: 12px; color: rgba(255,255,255,0.2); margin-top: 8px; }

/* stagger animation delays for grid */
.game-card:nth-child(1){animation-delay:.00s}
.game-card:nth-child(2){animation-delay:.04s}
.game-card:nth-child(3){animation-delay:.08s}
.game-card:nth-child(4){animation-delay:.12s}
.game-card:nth-child(5){animation-delay:.16s}
.game-card:nth-child(6){animation-delay:.20s}
</style>
</head>
<body>

<div id="app">

  <!-- ── Nav ── -->
  <nav class="nav">
    <div class="nav-logo">Hand<em>held</em></div>
    <div class="nav-right">
      <span class="nav-clock" id="clock">00:00</span>
      <button class="nav-add" title="Add ROM">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <input type="file" accept=".gb,.gbc,.gba,.GB,.GBC,.GBA" onchange="handleFile(this)">
      </button>
    </div>
  </nav>

  <!-- ── Filter pills ── -->
  <div class="filters" id="filters">
    <button class="pill active" data-filter="all" onclick="setFilter(this)">All</button>
    <button class="pill" data-filter="GB" onclick="setFilter(this)">Game Boy</button>
    <button class="pill" data-filter="GBC" onclick="setFilter(this)">Game Boy Color</button>
    <button class="pill" data-filter="GBA" onclick="setFilter(this)">GBA</button>
  </div>

  <!-- ── Grid ── -->
  <div class="grid-wrap" id="grid-wrap">
    <!-- filled by JS -->
  </div>

  <!-- ── Tab bar ── -->
  <div class="tabbar">
    <button class="tab-btn active">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span>Library</span>
    </button>
    <button class="tab-btn">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      <span>Search</span>
    </button>
    <button class="tab-btn">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Profile</span>
    </button>
  </div>

</div>

<!-- ── Emulator overlay ── -->
<div id="emu-overlay">
  <div class="emu-nav">
    <button class="emu-back" onclick="exitEmu()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Library
    </button>
    <span class="emu-title" id="emu-title"></span>
    <div class="emu-status-dot" id="emu-dot"></div>
  </div>
  <div id="emulator"></div>
</div>

<script>
// ── Data ──
const DEMO_GAMES = [
  { title: 'Tetris',            system: 'GB',  emoji: '🧱', cover: 'cv-slate',  meta: 'Nintendo · 1989' },
  { title: 'Pokémon Crystal',   system: 'GBC', emoji: '💎', cover: 'cv-sage',   meta: 'Game Freak · 2000' },
  { title: 'Metroid Fusion',    system: 'GBA', emoji: '🚀', cover: 'cv-mauve',  meta: 'Nintendo · 2002' },
  { title: "Kirby's Dream Land",system: 'GB',  emoji: '⭐', cover: 'cv-rose',   meta: 'HAL Lab · 1992' },
  { title: 'Castlevania AOS',   system: 'GBA', emoji: '🏰', cover: 'cv-stone',  meta: 'Konami · 2003' },
  { title: 'Zelda: Ages',       system: 'GBC', emoji: '🗡️', cover: 'cv-sand',   meta: 'Capcom · 2001' },
];

let userGames = [];   // { title, system, emoji, cover, meta, romUrl }
let filter = 'all';

// ── Clock ──
function tick() {
  const d = new Date();
  document.getElementById('clock').textContent =
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
tick(); setInterval(tick, 10000);

// ── Filter ──
function setFilter(btn) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  filter = btn.dataset.filter;
  render();
}

// ── Render grid ──
function render() {
  const wrap = document.getElementById('grid-wrap');
  const allGames = [...userGames, ...DEMO_GAMES];
  const visible = filter === 'all' ? allGames : allGames.filter(g => g.system === filter);

  if (allGames.length === 0) {
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎮</div>
        <div class="empty-title">No games yet</div>
        <div class="empty-sub">Add a ROM file to start playing on your collection.</div>
        <button class="empty-btn">
          Add your first ROM
          <input type="file" accept=".gb,.gbc,.gba,.GB,.GBC,.GBA" onchange="handleFile(this)">
        </button>
      </div>`;
    return;
  }

  const colors = ['cv-stone','cv-sand','cv-sage','cv-slate','cv-rose','cv-mauve','cv-clay','cv-mist'];
  let html = `<div class="grid-section-label">${visible.length} game${visible.length!==1?'s':''}</div><div class="grid">`;

  // Add tile
  html += `
    <div class="add-card" title="Add ROM">
      <div class="add-card-icon">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
      <span class="add-card-label">Add ROM</span>
      <input type="file" accept=".gb,.gbc,.gba,.GB,.GBC,.GBA" onchange="handleFile(this)">
    </div>`;

  visible.forEach((g, i) => {
    const cover = g.cover || colors[i % colors.length];
    const isUser = !!g.romUrl;
    html += `
      <div class="game-card" onclick="${isUser ? `launchRom('${encodeURIComponent(g.romUrl)}','${g.system}','${encodeURIComponent(g.title)}')` : `demoLaunch('${encodeURIComponent(g.title)}','${g.system}','${g.emoji}')`}" style="animation-delay:${i*0.04}s">
        <div class="card-cover ${cover}">
          <div class="card-cover-inner">
            <span class="card-cover-emoji">${g.emoji}</span>
          </div>
          <span class="card-system-badge">${g.system}</span>
        </div>
        <div class="card-info">
          <div class="card-title">${g.title}</div>
          <div class="card-meta">${g.meta || 'Your Library'}</div>
        </div>
      </div>`;
  });

  html += '</div>';
  wrap.innerHTML = html;
}

// ── File upload ──
function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  const sysMap = { gb: 'GB', gbc: 'GBC', gba: 'GBA' };
  const sys = sysMap[ext] || 'GB';
  const covers = ['cv-clay','cv-mist','cv-slate','cv-rose','cv-mauve'];
  const game = {
    title: file.name.replace(/\.[^.]+$/, ''),
    system: sys,
    emoji: '🎮',
    cover: covers[userGames.length % covers.length],
    meta: 'Your Library',
    romUrl: URL.createObjectURL(file),
  };
  userGames.unshift(game);
  render();
  // immediately launch
  launchRom(game.romUrl, game.system, game.title);
}

// ── Demo launch ──
function demoLaunch(titleEnc, system, emoji) {
  const title = decodeURIComponent(titleEnc);
  const overlay = document.getElementById('emu-overlay');
  document.getElementById('emu-title').textContent = title;
  document.getElementById('emu-dot').classList.remove('visible');
  document.getElementById('emulator').innerHTML = `
    <div class="demo-placeholder">
      <div class="demo-emoji">${emoji}</div>
      <div class="demo-label">${system === 'GB' ? 'Game Boy' : system === 'GBC' ? 'Game Boy Color' : 'Game Boy Advance'}</div>
      <div class="demo-name">${title}</div>
      <div class="demo-desc">No ROM loaded. Upload a <strong style="color:rgba(255,255,255,0.7)">.${system.toLowerCase()}</strong> file using the + button in the top right.</div>
      <div class="demo-hint">ROMs not included for legal reasons — only use games you own.</div>
    </div>`;
  overlay.classList.add('open');
}

// ── Real ROM launch ──
function launchRom(romUrlEnc, system, titleEnc) {
  const romUrl = typeof romUrlEnc === 'string' && romUrlEnc.startsWith('blob') ? romUrlEnc : decodeURIComponent(romUrlEnc);
  const title  = decodeURIComponent(titleEnc);

  const overlay = document.getElementById('emu-overlay');
  document.getElementById('emu-title').textContent = title;
  document.getElementById('emu-dot').classList.remove('visible');
  document.getElementById('emulator').innerHTML = '';
  overlay.classList.add('open');

  // clear stale EJS globals
  Object.keys(window).filter(k => k.startsWith('EJS_')).forEach(k => { try { delete window[k]; } catch(e){} });

  const coreMap = { GB: 'gb', GBC: 'gb', GBA: 'gba' };
  window.EJS_player      = '#emulator';
  window.EJS_core        = coreMap[system] || 'gb';
  window.EJS_gameUrl     = romUrl;
  window.EJS_gameName    = title;
  window.EJS_pathtodata  = 'https://cdn.emulatorjs.org/stable/data/';
  window.EJS_startOnLoaded = true;
  window.EJS_color       = '#111110';

  document.querySelectorAll('#ejs-loader').forEach(el => el.remove());
  const s = document.createElement('script');
  s.id = 'ejs-loader';
  s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
  s.onload = () => document.getElementById('emu-dot').classList.add('visible');
  s.onerror = () => {
    document.getElementById('emulator').innerHTML = `
      <div class="demo-placeholder">
        <div style="font-size:40px">⚠️</div>
        <div class="demo-desc" style="color:rgba(255,100,100,0.8)">Could not load EmulatorJS. Check your internet connection.</div>
      </div>`;
  };
  document.body.appendChild(s);
}

// ── Exit emulator ──
function exitEmu() {
  document.getElementById('emu-overlay').classList.remove('open');
  document.getElementById('emulator').innerHTML = '';
  document.querySelectorAll('#ejs-loader').forEach(el => el.remove());
  Object.keys(window).filter(k => k.startsWith('EJS_')).forEach(k => { try { delete window[k]; } catch(e){} });
}

// ── Init ──
